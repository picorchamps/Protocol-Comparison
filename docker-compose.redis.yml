services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 3gb
      --maxmemory-policy noeviction
      --proto-max-bulk-len 536870912
      --client-output-buffer-limit pubsub 0 0 0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 10

  receiver:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: redis receiver --test ${TEST:-throughput} --output /results/results_redis_${TEST:-throughput}.json
    depends_on:
      redis:
        condition: service_healthy
    environment:
      RUST_LOG: info
    volumes:
      - ./results:/results

  sender:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: redis sender --test ${TEST:-throughput} --host redis
    depends_on:
      - receiver
    environment:
      RUST_LOG: info
